services:
  postgres:
    image: postgres:14-alpine
    container_name: cloudberry-db
    environment:
      POSTGRES_DB: cloudberry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudberry

  redis:
    image: redis:7-alpine
    container_name: cloudberry-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cloudberry

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudberry-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloudberry
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: cloudberry-jwt-secret-key-change-in-production
      ENCRYPTION_KEY: your-32-byte-encryption-key-here
      CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - cloudberry

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudberry-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - cloudberry

volumes:
  postgres_data:
  redis_data:

networks:
  cloudberry:
    driver: bridge
