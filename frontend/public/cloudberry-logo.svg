<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="apacheBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="apacheOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="apacheGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background circle (Apache style) -->
  <circle cx="32" cy="32" r="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Cloud shape - stylized -->
  <g transform="translate(10, 12)">
    <!-- Main cloud body -->
    <circle cx="22" cy="28" r="12" fill="url(#apacheBlue)"/>
    <circle cx="14" cy="24" r="8" fill="url(#apacheBlue)"/>
    <circle cx="30" cy="24" r="8" fill="url(#apacheBlue)"/>
    <circle cx="22" cy="20" r="7" fill="url(#apacheBlue)"/>

    <!-- Berry elements (data nodes) -->
    <circle cx="8" cy="30" r="3" fill="url(#apacheOrange)"/>
    <circle cx="36" cy="30" r="3" fill="url(#apacheOrange)"/>
    <circle cx="22" cy="14" r="2.5" fill="url(#apacheGreen)"/>

    <!-- Data connection lines -->
    <line x1="10" y1="28" x2="14" y2="26" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="26" x2="34" y2="28" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="22" y1="17" x2="22" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Apache feather accent (subtle) -->
  <path d="M48 8 Q52 6 50 12 Q48 10 48 8" fill="url(#apacheGreen)" opacity="0.7"/>
</svg>
